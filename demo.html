<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpendScope Full Integrated Demo</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root { 
            --primary-blue: #2563EB; 
            --primary-light: #dbeafe;
            --bg-gray: #f9fafb; 
            --text-dark: #111827; 
            --text-gray: #6b7280; 
            --food-color: #2563EB; 
        }
        body { margin: 0; font-family: 'Inter', -apple-system, sans-serif; background-color: #f3f4f6; color: var(--text-dark); }
        .app-container { max-width: 480px; margin: 0 auto; background: var(--bg-gray); min-height: 100vh; position: relative; padding-bottom: 90px; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
        
        /* Layout */
        .screen { padding: 24px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .screen-title { font-size: 20px; font-weight: 800; text-align: center; margin-bottom: 24px; }

        /* Typography */
        .d-28 { font-size: 28px; font-weight: 800; letter-spacing: -0.03em; }
        .h-20 { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }
        .l-12 { font-size: 12px; color: var(--text-gray); font-weight: 600; }

        /* Summary Cards (Home) */
        .summary-box { display: flex; gap: 12px; margin-bottom: 30px; }
        .sum-card { flex: 1; background: white; padding: 16px; border-radius: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .sum-card__val { display: block; margin-top: 4px; font-size: 24px; font-weight: 800; }

        /* Charts */
        .conic-chart { width: 180px; height: 180px; border-radius: 50%; margin: 0 auto 20px; position: relative; cursor: pointer; }
        .conic-chart::after { content: ""; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 120px; height: 120px; background: var(--bg-gray); border-radius: 50%; }
        .chart-legend { display: flex; gap: 12px; justify-content: center; margin-bottom: 30px; font-size: 12px; font-weight: 600; color: var(--text-gray); }
        .legend-dot { width: 10px; height: 10px; border-radius: 2px; margin-right: 4px; display: inline-block; }

        /* Transactions */
        .filter-bar { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 15px; margin-bottom: 10px; scrollbar-width: none; }
        .filter-bar::-webkit-scrollbar { display: none; }
        .filter-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid #e5e7eb; background: white; font-size: 13px; cursor: pointer; white-space: nowrap; }
        .filter-btn--active { background: var(--primary-blue); color: white; border-color: var(--primary-blue); }
        .t-group { margin-bottom: 24px; }
        .t-date { font-size: 12px; font-weight: 700; color: var(--text-gray); margin-bottom: 12px; }
        .t-card { display: flex; align-items: center; background: white; padding: 14px; border-radius: 12px; margin-bottom: 8px; }
        .t-icon { width: 40px; height: 40px; background: #f3f4f6; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-right: 12px; font-size: 20px; }
        .t-info { flex: 1; }
        .t-name { font-size: 14px; font-weight: 600; }
        .t-sub { font-size: 11px; color: var(--text-gray); }
        .t-amt { font-size: 15px; font-weight: 700; color: #ef4444; }

        /* Add Form */
        .form-sect { margin-bottom: 24px; }
        .input-big { width: 100%; border: none; border-bottom: 2px solid #eee; background: transparent; font-size: 32px; font-weight: 800; padding: 12px 0; outline: none; }
        .cat-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .cat-tag { padding: 8px 12px; border: 1px solid #eee; border-radius: 8px; cursor: pointer; background: white; font-size: 13px; }
        .cat-tag--active { background: var(--text-dark); color: white; border-color: var(--text-dark); }
        .btn-submit { width: 100%; padding: 16px; border-radius: 12px; background: var(--primary-blue); color: white; font-weight: 700; font-size: 16px; border: none; cursor: pointer; margin-top: 10px; }

        /* Analytics Specific */
        .food-box { background: white; padding: 24px; border-radius: 16px; border: 2px solid transparent; transition: 0.3s; }
        .food-box--active { border-color: var(--primary-blue); transform: scale(1.02); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .bar-track { width: 100%; height: 8px; background: #f1f3f5; border-radius: 4px; overflow: hidden; margin-top: 8px; }
        .bar-fill { height: 100%; background: var(--primary-blue); transition: width 0.8s; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 480px; height: 74px; background: white; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #eee; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #9ca3af; border: none; background: none; cursor: pointer; font-size: 11px; gap: 4px; }
        .nav-item--active { color: var(--primary-blue); font-weight: 700; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        const App = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [isChartFocused, setIsChartFocused] = useState(false);
            
            const [expenses, setExpenses] = useState([
                { id: 1, amount: 15000, category: '식비', subCategory: 'Dining Out', date: '오늘', memo: '점심 정식' },
                { id: 2, amount: 12000, category: '식비', subCategory: 'Grocery', date: '오늘', memo: '마트 계란, 우유' },
                { id: 3, amount: 8400, category: '교통', subCategory: null, date: '어제', memo: '지하철 정기권' },
                { id: 4, amount: 5500, category: '카페', subCategory: null, date: '어제', memo: '아이스 라떼' },
                { id: 5, amount: 9100, category: '쇼핑', subCategory: null, date: '2026-03-09', memo: '편의점 생필품' }
            ]);

            const foodSpending = useMemo(() => expenses.filter(e => e.category === '식비').reduce((a, b) => a + b.amount, 0), [expenses]);
            const totalSpending = useMemo(() => expenses.reduce((a, b) => a + b.amount, 0), [expenses]);

            const addExpense = (data) => {
                setExpenses([{...data, id: Date.now()}, ...expenses]);
                setActiveTab('transactions');
            };

            const getIcon = (cat) => {
                switch(cat) {
                    case '식비': return '🍴';
                    case '카페': return '☕';
                    case '교통': return '🚌';
                    case '쇼핑': return '🛍️';
                    default: return '📄';
                }
            };

            return (
                <div className="app-container">
                    {/* Screens Switching */}
                    {activeTab === 'home' && <HomeScreen total={totalSpending} food={foodSpending} items={expenses.slice(0, 3)} getIcon={getIcon} />}
                    {activeTab === 'transactions' && <TransactionsScreen expenses={expenses} getIcon={getIcon} />}
                    {activeTab === 'add' && <AddScreen onAdd={addExpense} />}
                    {activeTab === 'analytics' && (
                        <AnalyticsScreen 
                            total={totalSpending} 
                            expenses={expenses} 
                            isFocused={isChartFocused} 
                            setIsFocused={setIsChartFocused} 
                        />
                    )}

                    <nav className="bottom-nav">
                        {['home', 'transactions', 'add', 'analytics'].map(t => (
                            <button key={t} className={`nav-item ${activeTab === t ? 'nav-item--active' : ''}`} onClick={() => setActiveTab(t)}>
                                <span style={{fontSize:'20px'}}>{t === 'home' ? '🏠' : t === 'transactions' ? '📄' : t === 'add' ? '➕' : '📊'}</span>
                                {t.charAt(0).toUpperCase() + t.slice(1)}
                            </button>
                        ))}
                    </nav>
                </div>
            );
        };

        const HomeScreen = ({ total, food, items, getIcon }) => (
            <div className="screen">
                <header style={{marginBottom:'24px'}}><h1 className="h-20">SpendScope Dashboard</h1></header>
                <div className="summary-box">
                    <div className="sum-card"><span className="l-12">Monthly Expenditure</span><span className="sum-card__val h-20">${total.toLocaleString()}</span></div>
                    <div className="sum-card"><span className="l-12">Food Expenditure</span><span className="sum-card__val h-20">${food.toLocaleString()}</span></div>
                </div>
                <div className="conic-chart" style={{background: 'conic-gradient(var(--food-color) 0% 54%, #3b82f6 54% 80%, #94a3b8 80% 100%)'}}></div>
                <div className="chart-legend">
                    <span><span className="legend-dot" style={{background:'var(--food-color)'}}></span>식비</span>
                    <span><span className="legend-dot" style={{background:'#3b82f6'}}></span>교통</span>
                    <span><span className="legend-dot" style={{background:'#94a3b8'}}></span>기타</span>
                </div>
                <h2 className="h-20" style={{fontSize:'16px', marginBottom:'16px'}}>Recent Transactions</h2>
                {items.map(i => (
                    <div key={i.id} className="t-card">
                        <div className="t-icon">{getIcon(i.category)}</div>
                        <div className="t-info"><div className="t-name">{i.memo || i.category}</div><div className="t-sub">{i.date} {i.category}</div></div>
                        <div className="t-amt">-${i.amount.toLocaleString()}</div>
                    </div>
                ))}
            </div>
        );

        const TransactionsScreen = ({ expenses, getIcon }) => {
            const [filter, setFilter] = useState('전체');
            const data = filter === '전체' ? expenses : expenses.filter(e => e.category === filter);
            const grouped = data.reduce((acc, curr) => {
                if (!acc[curr.date]) acc[curr.date] = [];
                acc[curr.date].push(curr);
                return acc;
            }, {});

            return (
                <div className="screen">
                    <h1 className="screen-title">All Transactions</h1>
                    <div className="filter-bar">
                        {['전체', '식비', '교통', '카페', '쇼핑'].map(c => (
                            <button key={c} className={`filter-btn ${filter === c ? 'filter-btn--active' : ''}`} onClick={() => setFilter(c)}>{c}</button>
                        ))}
                    </div>
                    {Object.entries(grouped).map(([date, items]) => (
                        <div key={date} className="t-group">
                            <div className="t-date">{date}</div>
                            {items.map(i => (
                                <div key={i.id} className="t-card">
                                    <div className="t-icon">{getIcon(i.category)}</div>
                                    <div className="t-info"><div className="t-name">{i.category}</div><div className="t-sub">{i.memo}</div></div>
                                    <div className="t-amt">-${i.amount.toLocaleString()}</div>
                                </div>
                            ))}
                        </div>
                    ))}
                </div>
            );
        };

        const AddScreen = ({ onAdd }) => {
            const [amt, setAmt] = useState('');
            const [cat, setCat] = useState('식비');
            const [memo, setMemo] = useState('');

            return (
                <div className="screen">
                    <h1 className="screen-title">Add New Expense</h1>
                    <div className="form-sect">
                        <label className="l-12">AMOUNT</label>
                        <input className="input-big" type="number" placeholder="0.00" value={amt} onChange={e => setAmt(e.target.value)} />
                    </div>
                    <div className="form-sect">
                        <label className="l-12">CATEGORY</label>
                        <div className="cat-group">
                            {['식비', '교통', '카페', '쇼핑', '기타'].map(c => (
                                <button key={c} className={`cat-tag ${cat === c ? 'cat-tag--active' : ''}`} onClick={() => setCat(c)}>{c}</button>
                            ))}
                        </div>
                    </div>
                    <div className="form-sect">
                        <label className="l-12">MEMO</label>
                        <input className="input-big" style={{fontSize:'18px'}} placeholder="Add memo..." value={memo} onChange={e => setMemo(e.target.value)} />
                    </div>
                    <button className="btn-submit" onClick={() => onAdd({amount: Number(amt), category: cat, memo, date: '오늘'})}>Save Transaction</button>
                </div>
            );
        };

        const AnalyticsScreen = ({ total, expenses, isFocused, setIsFocused }) => {
            const dining = expenses.filter(e => e.subCategory === 'Dining Out').reduce((a, b) => a + b.amount, 0);
            const grocery = expenses.filter(e => e.subCategory === 'Grocery').reduce((a, b) => a + b.amount, 0);
            const foodT = dining + grocery;
            const ratio = ((foodT / total) * 100).toFixed(1);

            return (
                <div className="screen">
                    <h1 className="screen-title">Deep Analytics</h1>
                    <div className="total-banner">
                        <span className="l-12">Total Expenditure</span>
                        <div className="d-28" style={{marginTop:'4px'}}>${total.toLocaleString()}</div>
                    </div>
                    <div className="conic-chart" onClick={() => { setIsFocused(true); setTimeout(() => setIsFocused(false), 2000); }}
                         style={{width:'220px', height:'220px', background: `conic-gradient(var(--primary-blue) 0% ${ratio}%, #e2e8f0 ${ratio}% 100%)`}}>
                        <div style={{position:'absolute', top:'50%', left:'50%', transform:'translate(-50%, -50%)', zIndex:10, textAlign:'center'}}>
                            <div className="h-20" style={{color: 'var(--primary-blue)'}}>{ratio}%</div>
                            <div className="l-12">식비 비중</div>
                        </div>
                    </div>
                    <div className={`food-box ${isFocused ? 'food-box--active' : ''}`}>
                        <div style={{display:'flex', justifyContent:'space-between', marginBottom:'16px'}}>
                            <h3 className="h-20" style={{fontSize:'16px'}}>Food Expenditure Analysis</h3>
                            <span className="h-20" style={{fontSize:'16px', color: 'var(--primary-blue)'}}>${foodT.toLocaleString()}</span>
                        </div>
                        <div className="bar-row">
                            <div style={{display:'flex', justifyContent:'space-between', fontSize:'13px', fontWeight:600}}><span>Dining Out</span><span>${dining.toLocaleString()}</span></div>
                            <div className="bar-track"><div className="bar-fill" style={{width: `${(dining/foodT)*100}%`}}></div></div>
                        </div>
                        <div className="bar-row" style={{marginTop:'12px'}}>
                            <div style={{display:'flex', justifyContent:'space-between', fontSize:'13px', fontWeight:600}}><span>Grocery</span><span>${grocery.toLocaleString()}</span></div>
                            <div className="bar-track"><div className="bar-fill" style={{width: `${(grocery/foodT)*100}%`, background: '#93c5fd'}}></div></div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
